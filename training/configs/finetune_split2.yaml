# Fine-tune A2SB split 2 (t in [0.5, 1.0]) - single GPU
# Manifest path is overridden by finetune.py via CLI (mix_dataset_config.CURATED).
seed_everything: 42
trainer:
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32-true
  logger: null
  callbacks: null
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: 5000
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 1000
  check_val_every_n_epoch: 1
  num_sanity_val_steps: 2
  log_every_n_steps: 50
  enable_checkpointing: true
  enable_progress_bar: true
  enable_model_summary: true
  accumulate_grad_batches: 4
  gradient_clip_val: 0.5
  gradient_clip_algorithm: norm
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: false
  profiler: null
  detect_anomaly: false
  barebones: false
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: /data/training_output/split_0.5_1.0

model:
  train_t_min: 0.5
  train_t_max: 1.0
  learning_rate: 0.00005
  weight_decay: 1.0e-08
  vf_model:
    class_path: networks.AttnUNetF
    init_args:
      n_updown_levels: 5
      in_channels: 3
      hidden_channels: [128, 256, 512, 768, 1024, 2048]
      out_channels: 3
      emb_channels: 128
      rotary_dims: 16
      band_embedding_dim: 16
      n_attn_heads: 8
      attention_levels:
        - 3
        - 4
      use_attn_input_norm: true
      num_res_blocks: 2
  inv_transforms:
    - class_path: audio_transforms.transforms.PowerScaleSpectrogram
      init_args:
        power: 4
        channels:
          - 0
        eps: 1.0e-09
    - class_path: audio_transforms.transforms.SpectrogramAddDCTerm
    - class_path: audio_transforms.transforms.SVDFixMagInstPhase
    - class_path: audio_transforms.transforms.MagInstPhaseToComplex
    - class_path: audio_transforms.transforms.InverseComplexSpectrogram
      init_args:
        n_fft: 2048
        win_length: 2048
        hop_length: 512
        eps: 1.0e-09
  sampling_rate: 44100
  n_timestep_channels: 128
  use_ot_ode: false
  beta_max: 1.0

data:
  mix_dataset_config:
    CURATED:
      root_folder: /data/training_output
      filename: finetune_manifest.csv
  segment_length: 130560
  sampling_rate: 44100
  num_workers: 4
  batch_size: 2
  val_max_samples: 256
  transforms_aug:
    - class_path: corruption.corruptions.MultinomialInpaintMaskTransform
      init_args:
        p_upsample_mask: 0.5
        p_extension_mask: 0.0
        p_inpaint_mask: 0.5
        fill_noise_level: 0.5
        sampling_rate: 44100
        upsample_mask_kwargs:
          min_cutoff_freq: 2000
          max_cutoff_freq: 20000
        inpainting_mask_kwargs:
          min_inpainting_frac: 0.03378
          max_inpainting_frac: 0.5404
          is_random: true
  eval_transforms_aug:
    - class_path: corruption.corruptions.MultinomialInpaintMaskTransform
      init_args:
        p_upsample_mask: 0.5
        p_extension_mask: 0.0
        p_inpaint_mask: 0.5
        fill_noise_level: 0.5
        sampling_rate: 44100
        upsample_mask_kwargs:
          min_cutoff_freq: 4000
          max_cutoff_freq: 4000
        inpainting_mask_kwargs:
          min_inpainting_frac: 0.1013
          max_inpainting_frac: 0.1013
          is_random: false
  transforms_gt:
    - class_path: audio_transforms.transforms.ComplexSpectrogram
      init_args:
        n_fft: 2048
        win_length: 2048
        hop_length: 512
        eps: 1.0e-09
    - class_path: audio_transforms.transforms.ComplexToMagInstPhase
    - class_path: audio_transforms.transforms.SpectrogramDropDCTerm
    - class_path: audio_transforms.transforms.PowerScaleSpectrogram
      init_args:
        power: 0.25
        channels:
          - 0
        eps: 1.0e-09

checkpoint_callback:
  dirpath: /data/training_output/split_0.5_1.0
  filename: "latest-epoch_{epoch}-iter_{global_step:.0f}"
  monitor: global_step
  mode: max
  every_n_train_steps: 1000
  save_top_k: -1
  auto_insert_metric_name: false
